    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "AKcelerate",
        "url": "https://akcelerate.lovable.app",

          "https://www.linkedin.com/company/akceleratehq/",

        ]
      }

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "AKcelerate",
        "url": "https://akcelerate.lovable.app",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://akcelerate.lovable.app/blog?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <script>
      (function () {
        try {
          var t = localStorage.getItem('ak-theme');
          if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          if (t === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>

    <style>
      #preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #fff;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      html.dark #preloader { background: hsl(220, 20%, 7%); }
      html.dark #preloader .logo-text { color: #F1F5F9; }
      html.dark #preloader .loader-bar { background: #334155; }
      #preloader.fade-out {
        opacity: 0;
        visibility: hidden;
      }
      #preloader .logo-text {
        font-family: 'Poppins', system-ui, sans-serif;
        font-size: 2rem;
        font-weight: 700;
        color: #1E293B;
        margin-bottom: 2rem;
        letter-spacing: -0.02em;
      }
      #preloader .logo-text span {
        background: linear-gradient(135deg, #2563EB, #06B6D4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      #preloader .loader-bar {
        width: 200px;
        height: 3px;
        background: #E2E8F0;
        border-radius: 3px;
        overflow: hidden;
        position: relative;
      }
      #preloader .loader-bar::after {
        content: '';
        position: absolute;
        inset: 0;
        width: 40%;
        background: linear-gradient(135deg, #2563EB, #06B6D4);
        border-radius: 3px;
        animation: preloader-slide 1s ease-in-out infinite;
      }
      @keyframes preloader-slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }
    </style>
    <meta property="og:title" content="AKcelerate — AI &amp; Digital Solutions">
  <meta name="twitter:title" content="AKcelerate — AI &amp; Digital Solutions">
  <meta property="og:description" content="AKcelerate delivers AI consulting, data analytics, and digital transformation solutions for enterprise growth.">
  <meta name="twitter:description" content="AKcelerate delivers AI consulting, data analytics, and digital transformation solutions for enterprise growth.">
</head>

  <body>
    <div id="preloader">
      <div class="logo-text">AK<span>celerate</span></div>
      <div class="loader-bar"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var el = document.getElementById('preloader');
          if (el) {
            el.classList.add('fade-out');
            setTimeout(function() { el.remove(); }, 500);
          }
        }, 800);
      });
    </script>
  </body>
</html>
