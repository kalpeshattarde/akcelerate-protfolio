<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 48" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <!-- Icon -->
  <rect x="0" y="4" width="40" height="40" rx="10" fill="url(#iconGrad)"/>
  <polyline points="10,24 16,24 20,14 24,34 28,20 32,24 36,24" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" transform="translate(-2,0)"/>
  <!-- AK text in white -->
  <text x="52" y="35" font-family="Poppins, system-ui, sans-serif" font-weight="700" font-size="28" fill="#F1F5F9">AK</text>
  <!-- celerate text in gradient -->
  <text x="90" y="35" font-family="Poppins, system-ui, sans-serif" font-weight="700" font-size="28" fill="url(#grad)">celerate</text>
</svg>